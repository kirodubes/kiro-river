# Kiro river — system-wide GTK appearance defaults (delivered via dconf).
# pywal recolours waybar accents from the wallpaper at login; this sets the
# base GTK theme/icon/cursor so the desktop isn't Adwaita/blank out of the
# box (set-theme.sh never touches GTK theme or icon selection).
[org/gnome/desktop/interface]
color-scheme='prefer-dark'
gtk-theme='adw-gtk3-dark'
icon-theme='Surfn'
cursor-theme='Bibata-Modern-Ice'
cursor-size=24
